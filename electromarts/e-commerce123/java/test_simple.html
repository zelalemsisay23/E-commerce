<!DOCTYPE html>
<html>

<head>
    <title>Simple Image Test</title>
</head>

<body>
    <h1>Image Test</h1>
    <p>Testing if images display:</p>

    <h2>Placeholder:</h2>
    <img src="images/placeholder.jpg" alt="Placeholder" style="border: 1px solid red; width: 200px; height: 200px;">

    <h2>Product Image:</h2>
    <img src="images/products/iphone15pro.jpg" alt="iPhone" style="border: 1px solid red; width: 200px; height: 200px;">

    <h2>Direct Path Test:</h2>
    <img src="./images/products/iphone15pro.jpg" alt="iPhone Direct"
        style="border: 1px solid red; width: 200px; height: 200px;">
</body>

</html>
